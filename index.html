<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Rush for Water</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <div class="brand-header">
      <img src="img/Charity_Logo.jpg" alt="charity: water logo" class="brand-logo">
      <h1>Rush for Water</h1>
    </div>

    <p class="game-instructions">
      Collect clean jerrycans before time runs out, but avoid dirty cans!
    </p>

    <div class="difficulty-row">
      <label for="difficulty">Difficulty:</label>
      <select id="difficulty">
        <option value="easy">Easy</option>
        <option value="normal" selected>Normal</option>
        <option value="hard">Hard</option>
      </select>
    </div>

    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Goal: <span id="goal-cans">20</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>

    <div id="achievements" class="achievement"></div>

    <div class="game-grid"></div>

    <div class="button-row">
      <button id="start-game">Start Game</button>
      <button id="reset-game" class="secondary-button">Reset Game</button>
    </div>

    <footer class="site-footer">
      <p>Learn more about the mission behind this game:</p>
      <div class="footer-links">
        <a href="https://www.charitywater.org/" target="_blank" rel="noopener noreferrer" aria-label="Visit the charity: water website">Visit charity: water</a>
        <a href="https://www.charitywater.org/donate" target="_blank" rel="noopener noreferrer" aria-label="Donate on the charity: water donation page">Donate to charity: water</a>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
